# ── OptimaTech-Smart API — Railway config ────────────────────
[build]
builder          = "DOCKERFILE"
dockerfilePath   = "Dockerfile"

[deploy]
startCommand        = "node dist/main"
healthcheckPath     = "/api/health"
healthcheckTimeout  = 30
restartPolicyType   = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "optimatech-api"
